name: Build Flet Client

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release version (e.g., 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14.4'

      - name: Install dependencies using UV
        run: |
          curl -sSL https://get.uvpkg.com | bash
          uv sync  # Ensure all dependencies are in sync

      - name: Build macOS app
        run: |
          flet build macos \
            --output dist \
            --no-interactive

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: MiningProcessor-macOS
          path: dist/MiningProcessor.app

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14.4'

      - name: Install dependencies using UV
        run: |
          curl -sSL https://get.uvpkg.com | bash
          uv sync  # Ensure all dependencies are in sync

      - name: Build Windows app
        run: |
          flet build windows --output dist --no-interactive

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: MiningProcessor-Windows
          path: dist/MiningProcessor.exe