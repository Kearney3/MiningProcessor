# docs: https://v2.tauri.app/distribute/pipelines/github/
# 构建 Tauri 桌面应用：macOS (arm64) + Windows (x64 / arm64)

name: Build Tauri App

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  UV_PYTHON: "3.14"
  PYTHONUTF8: 1

# 防止同一分支多次触发
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ══════════════════════════════════════════════════════════
  # macOS arm64
  # ══════════════════════════════════════════════════════════
  build-macos:
    name: macOS arm64
    runs-on: macos-latest  # Apple Silicon (M1+)
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Python sidecar (PyInstaller)
        shell: bash
        run: |
          uv sync --dev
          uv run pyinstaller tauri_bridge.spec \
            --distpath build-sidecar \
            --clean --noconfirm
          ls -lh build-sidecar/tauri-bridge

      - name: Build frontend
        run: pnpm build

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
          releaseName: "矿山数据处理工具 ${{ github.ref_name }}"
          releaseBody: "See the assets below for download links."
          releaseDraft: true
          prerelease: false
          args: "--target aarch64-apple-darwin"

      - name: Embed sidecar into .app bundle
        shell: bash
        run: |
          # Tauri action 使用 --target 时产物在 target/<triple>/ 下
          BUNDLE_DIR="src-tauri/target/aarch64-apple-darwin/release/bundle"
          APP_DIR=$(find "$BUNDLE_DIR/macos" -name "*.app" -maxdepth 1 | head -1)
          if [ -n "$APP_DIR" ]; then
            cp build-sidecar/tauri-bridge "$APP_DIR/Contents/MacOS/tauri-bridge"
            chmod +x "$APP_DIR/Contents/MacOS/tauri-bridge"
            codesign --force --sign - "$APP_DIR/Contents/MacOS/tauri-bridge" || true
            codesign --force --sign - "$APP_DIR" || true
            echo "✅ Sidecar embedded in $APP_DIR"
            ls -lh "$APP_DIR/Contents/MacOS/"
          else
            echo "⚠️ .app bundle not found in $BUNDLE_DIR"
            ls -R "$BUNDLE_DIR" || true
          fi

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error

  # ══════════════════════════════════════════════════════════
  # Windows x64
  # ══════════════════════════════════════════════════════════
  build-windows-x64:
    name: Windows x64
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Python sidecar (PyInstaller)
        shell: bash
        run: |
          uv sync --dev
          uv run pyinstaller tauri_bridge.spec \
            --distpath build-sidecar \
            --clean --noconfirm
          ls -lh build-sidecar/tauri-bridge.exe

      - name: Build frontend
        run: pnpm build

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: "--target x86_64-pc-windows-msvc"

      - name: Embed sidecar into Windows bundle
        shell: bash
        run: |
          # 查找 NSIS 安装包目录
          for dir in src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis; do
            if [ -d "$dir" ]; then
              cp build-sidecar/tauri-bridge.exe "$dir/" 2>/dev/null || true
              echo "✅ Sidecar placed in $dir"
            fi
          done
          # 也复制到 release 目录供直接运行
          cp build-sidecar/tauri-bridge.exe src-tauri/target/x86_64-pc-windows-msvc/release/ 2>/dev/null || true
          echo "✅ Sidecar embedded for Windows x64"

      - name: Upload Windows x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            src-tauri/target/x86_64-pc-windows-msvc/release/tauri-bridge.exe
          if-no-files-found: warn

  # ══════════════════════════════════════════════════════════
  # Windows arm64（原生 arm64 runner + 原生 PyInstaller）
  # ══════════════════════════════════════════════════════════
  build-windows-arm64:
    name: Windows arm64
    runs-on: windows-11-arm  # GitHub 原生 Windows arm64 runner
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Python sidecar (PyInstaller — native arm64)
        shell: bash
        run: |
          # psycopg2-binary 没有 Windows ARM64 预编译 wheel，跳过安装
          uv sync --dev --no-install-package psycopg2-binary
          uv run pyinstaller tauri_bridge.spec \
            --distpath build-sidecar \
            --clean --noconfirm
          ls -lh build-sidecar/tauri-bridge.exe
          # 验证是原生 arm64 二进制
          file build-sidecar/tauri-bridge.exe || true

      - name: Build frontend
        run: pnpm build

      - name: Build Tauri app (native arm64)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: "--target aarch64-pc-windows-msvc"

      - name: Embed sidecar into Windows arm64 bundle
        shell: bash
        run: |
          for dir in src-tauri/target/aarch64-pc-windows-msvc/release/bundle/nsis; do
            if [ -d "$dir" ]; then
              cp build-sidecar/tauri-bridge.exe "$dir/" 2>/dev/null || true
              echo "✅ Native arm64 sidecar embedded in $dir"
            fi
          done

      - name: Upload Windows arm64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-arm64
          path: |
            src-tauri/target/aarch64-pc-windows-msvc/release/bundle/nsis/*.exe
          if-no-files-found: warn
