# docs: https://v2.tauri.app/distribute/pipelines/github/
# 构建 Tauri 桌面应用：macOS (arm64) + Windows (x64)

name: Build Tauri App

on:
  workflow_dispatch:

env:
  UV_PYTHON: "3.14"
  PYTHONUTF8: 1

# 防止同一分支多次触发
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ══════════════════════════════════════════════════════════
  # macOS arm64
  # ══════════════════════════════════════════════════════════
  build-macos:
    name: macOS arm64
    runs-on: macos-latest  # Apple Silicon (M1+)
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Python sidecar (PyInstaller)
        shell: bash
        run: |
          uv sync --dev
          uv run pyinstaller tauri_bridge.spec \
            --distpath build-sidecar \
            --clean --noconfirm
          ls -lh build-sidecar/tauri-bridge

      - name: Build frontend
        run: pnpm build

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
          releaseName: "矿山数据处理工具 ${{ github.ref_name }}"
          releaseBody: "See the assets below for download links."
          releaseDraft: true
          prerelease: false
          args: "--target aarch64-apple-darwin --bundles app"

      - name: Embed sidecar into .app bundle
        shell: bash
        run: |
          BUNDLE_DIR="src-tauri/target/aarch64-apple-darwin/release/bundle"
          APP_DIR=$(find "$BUNDLE_DIR/macos" -name "*.app" -maxdepth 1 | head -1)
          if [ -n "$APP_DIR" ]; then
            cp build-sidecar/tauri-bridge "$APP_DIR/Contents/MacOS/tauri-bridge"
            chmod +x "$APP_DIR/Contents/MacOS/tauri-bridge"
            codesign --force --sign - "$APP_DIR/Contents/MacOS/tauri-bridge" || true
            codesign --force --sign - "$APP_DIR" || true
            echo "✅ Sidecar embedded in $APP_DIR"
            ls -lh "$APP_DIR/Contents/MacOS/"
          else
            echo "⚠️ .app bundle not found in $BUNDLE_DIR"
            ls -R "$BUNDLE_DIR" || true
          fi

      - name: Create DMG
        shell: bash
        run: |
          BUNDLE_DIR="src-tauri/target/aarch64-apple-darwin/release/bundle"
          APP_DIR=$(find "$BUNDLE_DIR/macos" -name "*.app" -maxdepth 1 | head -1)
          APP_NAME=$(basename "$APP_DIR")
          VERSION=$(grep -o '"version": *"[^"]*"' src-tauri/tauri.conf.json | head -1 | cut -d'"' -f4)
          DMG_DIR="$BUNDLE_DIR/dmg"
          mkdir -p "$DMG_DIR"
          DMG_PATH="$DMG_DIR/${APP_NAME%.app}_${VERSION}_aarch64.dmg"

          STAGING=$(mktemp -d)
          cp -R "$APP_DIR" "$STAGING/"
          ln -s /Applications "$STAGING/Applications"
          hdiutil create \
            -volname "$APP_NAME" \
            -srcfolder "$STAGING" \
            -ov -format UDZO \
            "$DMG_PATH"
          rm -rf "$STAGING"
          echo "✅ DMG created: $DMG_PATH"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error

  # ══════════════════════════════════════════════════════════
  # Windows x64
  # ══════════════════════════════════════════════════════════
  build-windows-x64:
    name: Windows x64
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Python sidecar (PyInstaller)
        shell: bash
        run: |
          uv sync --dev
          uv run pyinstaller tauri_bridge.spec \
            --distpath build-sidecar \
            --clean --noconfirm
          ls -lh build-sidecar/tauri-bridge.exe

      - name: Build frontend
        run: pnpm build

      - name: Build Tauri app (NSIS, without sidecar)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: "--target x86_64-pc-windows-msvc --bundles nsis"

      - name: Embed sidecar and build NSIS installer
        shell: bash
        run: |
          BUNDLE_DIR="src-tauri/target/x86_64-pc-windows-msvc/release/bundle"

          # 嵌入 sidecar 到 bundle 目录，供后续 NSIS 打包
          cp build-sidecar/tauri-bridge.exe "$BUNDLE_DIR/"
          chmod +x "$BUNDLE_DIR/tauri-bridge.exe"
          echo "✅ Sidecar placed in $BUNDLE_DIR"

          # 重新打包 NSIS（Rust 二进制已缓存，不会重新编译）
          cargo tauri build --target x86_64-pc-windows-msvc --bundles nsis
          echo "✅ NSIS installer rebuilt with sidecar"

      - name: Upload Windows x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/tauri-bridge.exe
          if-no-files-found: warn
